name: ci

# Typecheck + test on every PR and push to main. Publishing runs the same
# checks again in publish.yml before uploading to npm.

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test
