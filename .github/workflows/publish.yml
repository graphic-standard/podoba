name: publish

# Publishes @podoba/* to npm. Push a version tag (e.g. `v0.0.2`) to trigger, or
# run it manually from the Actions tab. package.json is the source of truth: the
# version published is whatever sits in each package.json (bumped in lockstep),
# and scripts/publish.ts ABORTS if the pushed tag doesn't match it. So:
#
#   # bump all three packages/*/package.json to 0.0.2, commit, then:
#   git tag v0.0.2 && git push origin v0.0.2
#
# The `release` skill (.claude/skills/release) does all of that in one step.
# A GitHub Release also creates a tag, so cutting a release still triggers this.
#
# Auth: npm OIDC trusted publishing — NO token/secret. Each package must have a
# trusted publisher configured at npmjs.com (package → Settings → Trusted
# Publisher → GitHub Actions): org `graphic-standard`, repo `podoba`, workflow
# `publish.yml`. The `id-token: write` permission below lets npm exchange the
# workflow's OIDC token for a short-lived publish credential and auto-attach
# provenance.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required: npm OIDC trusted publishing + provenance

concurrency: publish-podoba

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # npm (not bun) performs the OIDC exchange; trusted publishing needs the
      # npm CLI >= 11.5.1, newer than what any Node LTS ships, so upgrade it.
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Upgrade npm (OIDC trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest && npm --version

      - run: bun install

      - name: Typecheck
        run: bun run typecheck

      # Publish in dependency order (react depends on tokens + tailwind).
      # scripts/publish.ts resolves catalog:/workspace: → concrete versions in
      # the published tarball (source keeps the catalog), then shells out to
      # `npm publish` per package (tokens → tailwind → react). --provenance emits
      # a signed attestation; with OIDC trusted publishing npm generates it
      # automatically, but we pass the flag to fail loudly if the environment
      # can't attest.
      - name: Publish @podoba/* to npm
        run: bun scripts/publish.ts --provenance
