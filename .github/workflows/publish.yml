name: publish

# Publishes @podoba/* to npm. Cut a GitHub Release (which creates the tag) to
# trigger, or run it manually from the Actions tab. The version published is
# whatever sits in each package.json — bump those (in lockstep) first.
#
# Requires one repo secret: NPM_TOKEN (an npm automation token for the @podoba
# org, with publish rights).

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # reserved for npm provenance — see NOTE at the bottom

concurrency: publish-podoba

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # Writes ~/.npmrc pointed at NODE_AUTH_TOKEN; bun reads it for auth.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: bun install

      - name: Typecheck
        run: bun run typecheck

      # Publish in dependency order (react depends on tokens + tailwind). bun
      # rewrites each workspace:* dep to the real version at pack time, so
      # consumers receive proper ranges instead of the workspace protocol.
      # --provenance emits a signed attestation (npm's id-token OIDC) proving the
      # tarball was built by this workflow from graphic-standard/podoba; it needs
      # the id-token: write permission above and a matching "repository" field in
      # each package.json.
      # scripts/publish.ts resolves catalog:/workspace: → concrete versions in
      # the published tarball (source keeps the catalog), then publishes tokens →
      # tailwind → react in dependency order with signed provenance.
      - name: Publish @podoba/* to npm
        run: bun scripts/publish.ts --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
